version: '3.9'

networks:
  aicredits-network:
    driver: bridge
    name: aicredits-network

volumes:
  pgdata-users:
    name: aicredits-pgdata-users
  pgdata-client:
    name: aicredits-pgdata-client
  pgdata-scoring:
    name: aicredits-pgdata-scoring
  pgdata-consultant:
    name: aicredits-pgdata-consultant
  keycloak-data:
    name: aicredits-keycloak-data

services:

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: aicredits-keycloak
    command: start-dev --import-realm
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    environment:
      KEYCLOAK_ADMIN:          ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      KC_DB:                   dev-file
      KC_LOG_LEVEL:            WARN
    volumes:
      - ../keycloak:/opt/keycloak/data/import:ro
      - keycloak-data:/opt/keycloak/data
    networks: [aicredits-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/master || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s


  discovery-service:
    build:
      context: ../../discovery-service
      dockerfile: Dockerfile
    container_name: aicredits-eureka
    ports:
      - "${EUREKA_PORT:-8761}:8761"
    networks: [aicredits-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s


  postgres-users:
    image: postgres:15-alpine
    container_name: aicredits-db-users
    ports:
      - "${DB_PORT_USERS:-5432}:5432"
    environment:
      POSTGRES_DB:       utilisateurs_db
      POSTGRES_USER:     ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin1234}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata-users:/var/lib/postgresql/data
      - ../database/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks: [aicredits-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d utilisateurs_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres-client:
    image: postgres:15-alpine
    container_name: aicredits-db-client
    ports:
      - "${DB_PORT_CLIENT:-5433}:5432"
    environment:
      POSTGRES_DB:       client_db
      POSTGRES_USER:     ${POSTGRES_USER:-pfe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pfe2026}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata-client:/var/lib/postgresql/data
    networks: [aicredits-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pfe} -d client_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-scoring:
    image: postgres:15-alpine
    container_name: aicredits-db-scoring
    ports:
      - "${DB_PORT_SCORING:-5434}:5432"
    environment:
      POSTGRES_DB:       scoring_db
      POSTGRES_USER:     ${POSTGRES_USER:-pfe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pfe2026}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata-scoring:/var/lib/postgresql/data
    networks: [aicredits-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pfe} -d scoring_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-consultant:
    image: postgres:15-alpine
    container_name: aicredits-db-consultant
    ports:
      - "${DB_PORT_CONSULTANT:-5435}:5432"
    environment:
      POSTGRES_DB:       consultant_db
      POSTGRES_USER:     ${POSTGRES_USER:-pfe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pfe2026}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata-consultant:/var/lib/postgresql/data
    networks: [aicredits-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pfe} -d consultant_db"]
      interval: 10s
      timeout: 5s
      retries: 5


  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: aicredits-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    networks: [aicredits-network]
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: aicredits-kafka
    depends_on: [zookeeper]
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    networks: [aicredits-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s


  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: aicredits-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks: [aicredits-network]
    restart: unless-stopped
    profiles: [monitoring]   # activé uniquement avec --profile monitoring

  grafana:
    image: grafana/grafana:10.2.0
    container_name: aicredits-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana123}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
    networks: [aicredits-network]
    restart: unless-stopped
    profiles: [monitoring]
