

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: 'pfe-creditai'
    env:     'dev'

scrape_configs:

  # ── API GATEWAY ──────────────────────────────────────────────
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance
        replacement:   'api-gateway'

  # ── USER SERVICE ─────────────────────────────────────────────
  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8081']

  # ── CLIENT SERVICE ───────────────────────────────────────────
  - job_name: 'client-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['client-service:8082']

  # ── SCORING SERVICE (FastAPI) ─────────────────────────────────
  - job_name: 'scoring-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['scoring-service:8000']

  # ── CONSULTANT SERVICE ───────────────────────────────────────
  - job_name: 'consultant-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['consultant-service:8083']

  # ── BASES DE DONNÉES (PostgreSQL Exporter) ───────────────────
  - job_name: 'postgres-users'
    static_configs:
      - targets: ['postgres-users:5432']

  # ── KAFKA ────────────────────────────────────────────────────
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']

  # ── PROMETHEUS LUI-MÊME ──────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
